        .weather-card {

            transform: translateY(-4px);

        /* ===== Header ===== */
        .app-title {
            font-size: 1.75rem;

        .search-form {

        .search-form .input-wrapper i {

        .search-form input[type="text"] {

        .search-form input[type="text"]:focus {
            border-color: #667eea;

        .search-form button {

        }

        .weather-description {
            text-align: center;

        .weather-details {

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            .weather-card {
                padding: 1.75rem 1.25rem;

                flex-direction: column;
            }

                justify-content: center;
            }

                flex-direction: column;

            }

                font-size: 2.75rem;

            .weather-details {
                grid-template-columns: repeat(3, 1fr);

        }

        /* ===== Utility ===== */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;

            clip: rect(0, 0, 0, 0);
            border: 0;

    </style>
</head>
<body>

    <script>
        (function() {
            'use strict';

            // ===== Configuration =====
            // Backend endpoint for weather data (proxy to OpenWeatherMap)
            const WEATHER_API_URL = '/api/weather';

            // DOM element references
            const form = document.getElementById('weatherForm');
            const cityInput = document.getElementById('cityInput');
            const searchButton = document.getElementById('searchButton');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const weatherResult = document.getElementById('weatherResult');

            // Weather display elements
            const cityNameEl = document.getElementById('cityName');
            const countryNameEl = document.getElementById('countryName');
            const dateTimeEl = document.getElementById('dateTime');
            const weatherIconEl = document.getElementById('weatherIcon');
            const tempValueEl = document.getElementById('tempValue');
            const weatherDescriptionEl = document.getElementById('weatherDescription');
            const humidityEl = document.getElementById('humidity');
            const windSpeedEl = document.getElementById('windSpeed');
            const visibilityEl = document.getElementById('visibility');

            // ===== Utility Functions =====

            /**
             * Show error message with given text.
             * @param {string} message - Error message to display
             */
            function showError(message) {
                errorText.textContent = message;
                errorMessage.classList.add('visible');
                weatherResult.classList.remove('visible');
                loadingSpinner.classList.remove('visible');
            }

            /**
             * Hide error message.
             */
            function hideError() {
                errorMessage.classList.remove('visible');
                errorText.textContent = '';
            }

            /**
             * Set loading state (show spinner, disable button).
             * @param {boolean} isLoading - Whether we are loading
             */
            function setLoading(isLoading) {
                if (isLoading) {
                    loadingSpinner.classList.add('visible');
                    searchButton.disabled = true;
                    searchButton.innerHTML = '<i class="fas fa-spinner fa-spin" aria-hidden="true"></i> Loading';
                } else {
                    loadingSpinner.classList.remove('visible');
                    searchButton.disabled = false;
                    searchButton.innerHTML = '<i class="fas fa-magnifying-glass" aria-hidden="true"></i><span>Search</span>';
                }
            }

            /**
             * Format a Unix timestamp (seconds) to a readable date/time string.
             * @param {number} timestamp - Unix timestamp in seconds
             * @param {number} timezoneOffset - Timezone offset in seconds (from API)
             * @returns {string} Formatted date/time
             */
            function formatDateTime(timestamp, timezoneOffset) {
                // Create date object using UTC methods to apply offset manually
                const date = new Date((timestamp + timezoneOffset) * 1000);
                const options = {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    timeZone: 'UTC' // we handle offset manually
                };
                // Use toLocaleDateString with UTC to avoid double offset
                return date.toLocaleDateString('en-US', options) + ' (local)';
            }

            /**
             * Convert wind speed from m/s to km/h (rounded).
             * @param {number} ms - Speed in meters per second
             * @returns {string} Speed in km/h with unit
             */
            function formatWindSpeed(ms) {
                const kmh = ms * 3.6;
                return `${Math.round(kmh)} km/h`;
            }

            /**
             * Convert visibility from meters to kilometers.
             * @param {number} meters - Visibility in meters
             * @returns {string} Visibility in km
             */
            function formatVisibility(meters) {
                const km = meters / 1000;
                return `${km.toFixed(1)} km`;
            }

            /**
             * Get appropriate Font Awesome icon class based on weather condition code.
             * Uses OpenWeatherMap icon codes (01d, 01n, etc.)
             * @param {string} iconCode - e.g., '01d', '10n'
             * @returns {string} Font Awesome icon class
             */
            function getFontAwesomeIcon(iconCode) {
                const code = iconCode.slice(0, 2); // e.g., '01', '10'
                const isNight = iconCode.endsWith('n');
                switch (code) {
                    case '01': return isNight ? 'fa-moon' : 'fa-sun';
                    case '02':
